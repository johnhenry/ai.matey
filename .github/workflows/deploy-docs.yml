name: Deploy Documentation

# Manual trigger only — deliberately not wired to push-to-main yet, and no
# longer targets GitHub Pages (migrated Docusaurus → Starlight + Cloudflare
# Workers static assets, matching the rest of the erisera family). Requires
# repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID (Workers
# Scripts:Edit scope) before this can actually run.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai.matey.docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build documentation
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
