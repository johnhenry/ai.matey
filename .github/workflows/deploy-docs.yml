name: Deploy Documentation

# Manual trigger only — deliberately not wired to push-to-main yet, and no
# longer targets GitHub Pages (migrated Docusaurus → Starlight + Cloudflare
# Workers static assets, matching the rest of the erisera family). Requires
# repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID (Workers
# Scripts:Edit scope) before this can actually run.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai.matey.docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build workspace packages
        # starlight-typedoc discovers each package's API entry point via its
        # package.json main/exports fields, which point at ./dist/*.d.ts —
        # without this, a fresh checkout (like this one) silently generates
        # zero API reference pages per package instead of erroring.
        # continue-on-error: ai.matey.http has a pre-existing, unrelated tsc
        # failure (Express type mismatch in adapter.ts) that would otherwise
        # block every other package's docs from deploying too; typedoc just
        # skips packages with no built entry point (warning, not fatal).
        run: npm run build
        working-directory: .
        continue-on-error: true

      - name: Build documentation
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
